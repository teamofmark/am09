<!DOCTYPE html>
<html lang="en">
<head>

    <title>JQuery - foldGallery</title>

    <style>
        .imgContainer{
            position: relative;
            height: 150px;

        .imgContainerMix{

        [class^='imgContainer'] img{
            transition: all 0.5s ease-in-out; position: absolute; left: 0; top: 0;
        }
    </style>
</head>

        <img src="https://via.placeholder.com/150" alt="imgExample">
        <img src="https://via.placeholder.com/150" alt="imgExample">
    </div>
    <button class="alignHori">정렬!</button>
    <button class="reset">원위치!</button>

</html>
