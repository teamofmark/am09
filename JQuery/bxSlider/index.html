<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bxslider</title>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bxslider/4.2.15/jquery.bxslider.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bxslider/4.2.15/jquery.bxslider.min.css" rel="stylesheet" />
    <script src="js/bxsliderCustom.js"></script>
    <link rel="stylesheet" href="css/bxsliderCustom.css">
</head>
<body>
    <ul class="bxslider">
        <li><img src="images/img_01.jpg" title="img01" alt="imgExample"></li>
        <li><img src="images/img_02.jpg" title="img02" alt="imgExample"></li>
        <li><img src="images/img_03.jpg" title="img03" alt="imgExample"></li>
        <li><img src="images/img_04.jpg" title="img04" alt="imgExample"></li>
    </ul>
    <div class="newControl">
        <a href="" class="btn_Prev"></a>
        <a href="" class="btn_Next"></a>
    </div>
    <!-- <div class="newPager">
        <a href="">1</a>
        <a href="">2</a>
        <a href="">3</a>
        <a href="">4</a>
    </div> -->
    <ol class="newPagerCustom">
        <li><a href="" data-slide-index="0">1</a></li>
        <li><a href="" data-slide-index="1">2</a></li>
        <li><a href="" data-slide-index="2">3</a></li>
        <li><a href="" data-slide-index="3">4</a></li>
    </ol>
</body>
</html>
