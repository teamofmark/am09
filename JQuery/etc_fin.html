<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etcFin - fish Race Game</title>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script src="js/etc_.js"></script>
    <style>
        body{
            font-size: 12px;
        }
        #panel{
            width: 700px; height: 600px; border: 1px solid #999; position: relative;
        }
        #bar{
            position: absolute; left: 550px; top: 0px; width: 20px; height: 600px;
            background-color: springgreen;
        }
        .fish{
            position: absolute; left: 0; top: 0;
        }
        #nav,#info{
            text-align: center; width: 700px;
        }
    </style>
</head>
<body>
    <div id="panel">
        <div id="bar"></div>

        <div class="fish">
            <img src="images/fish.png" alt="fish0">
        </div>
        <div class="fish">
            <img src="images/fish.png" alt="fish1">
        </div>
        <div class="fish">
            <img src="images/fish.png" alt="fish2">
        </div>
    </div>
    <div id="nav">
        <button id="start">
            game Start!
        </button>
    </div>
    <div id="info">
        record
    </div>
</body>
</html>
