<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQuery - 선택자</title>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="js/1_selector.js"></script>
</head>
<body>
    <!-- * case.1 대상 글자색 바꿔보기 -->
    <div>div1</div>
    <div>div2</div>
    <div>div3</div>
    <!-- * case.2 button click으로 alert 띄워보기 -->
    <button id="btnCheck">인사해라.</button>
    <!-- * case.3 button을 click하면 panel의 border 변경하기 -->
    <div id="panel">
        panelBorderBox
        <button id="btnAddBorder">border넣기</button>
    </div>
    <!-- todo. button click 시 panel2의 "글자크기(25px)","글자굵기(bold)","글자색상(green)","줄간(31px)" -->
    <div id="panel2">
        panel2. 글자의 크기,굵기,색상,줄간 바꾸기
        <button id="btnTextChange">속성바꾸기</button>
    </div>
</body>
</html>
