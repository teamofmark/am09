<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQuery - 선택자</title>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="js/1_selector.js"></script>
</head>
<body>
    <!-- case.1 대상 글자색 바꿔보기 -->
     <div>div1</div>
     <div>div2</div>
     <div>div3</div>
     <!-- case.2  buttonClick으로 인사 창 띄우기 -->
    <input type="button" value="인사해라" id="btnCheck">
    <!-- case.3 테두리넣어보기-->
    <div id="panel">
        나 panel. border넣어봐. <br>
        <button id="btnAddBorder">border넣기</button>
    </div>
    <!-- todo. 버튼을 click하면 panel2의 글자 크기(25px), 색상(green),굵기(bold),줄간(31px) 변경해보기 -->
    <div id="panel2">
        나 panel2. 글자의 내 크기, 굵기, 색상을 바꿔봐.
        <button id="btnTextChange">속성바꾸기</button>
    </div>
</body>
</html>
