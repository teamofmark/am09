<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQuery- Selector</title>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="js/1_selector.js"></script>
</head>
<body>
    <!-- case.1 대상 글자색 바꿔보기 -->
    <div>div1</div>
    <div>div2</div>
    <div>div3</div>
    <!-- case.2 buttonClick으로 alert띄워보기 -->
    <button id="btnCheck">인사해라</button>
    <!-- case.3 buttonClick으로 panel의 border 변경하기 -->
    <div id="panel">
        panel Border 넣어봐.
        <button id="btnAddBorder">border넣기</button>
    </div>
    <!-- todo. 버튼(id=btnTextChange)을 click하면 panel2의 글자 크기, 굵기, 색을변경 -->
    <div id="panel2">
        나 panel2. 내 글자 크기, 굵기, 색상을 바꿔봐.
        <button id="btnTextChange">속성바꾸기</button>
    </div>
</body>
</html>
