<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etc7 - 2depthTab(함수로 구조분리)</title>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script src="js/etc_7.js"></script>
    <style>
        *{
            margin: 0; padding: 0;
        }
        ul{
            display: flex; flex-flow: row nowrap; border: 1px solid black;
        }
        ul:first-of-type{
            border-bottom: none;
        }
        ul li {
            display: block; flex: auto; text-align: center; line-height: 40px;
            box-sizing: border-box; border-left: 1px solid black;
        }
        ul li:first-child{
            border-left: none;
        }
        li.activated,
        li:hover{
            background-color: black; color: white;
        }
    </style>
</head>
<body>
    <ul id="tabMenuDepth1">
        <li>m.tab</li>
        <li>m.tab</li>
        <li>m.tab</li>
        <li>m.tab</li>
        <li>m.tab</li>
        <li>m.tab</li>
    </ul>
    <ul id="tabMenuDepth2">
        <li>s.tab</li>
        <li>s.tab</li>
        <li>s.tab</li>
        <li>s.tab</li>
        <li>s.tab</li>
        <li>s.tab</li>
    </ul>
</body>
</html>
