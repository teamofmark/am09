<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etc3 - tab 과 customInput</title>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://kit.fontawesome.com/bba7cacd9f.js"></script>
    <script src="js/etc3.js"></script>
    <style>
        /* exp.1 style */
        .cp span{
            display: inline-block; vertical-align: middle; line-height: 15px;
        }
        .cp .ico{
            width: 15px;
        }
        .cp .label{
            font-size: 12px; cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- *exp.1 checkBox 만들어보기 -->
    <div class="cp checkBox">
        <span class="ico check"></span>
        <span class="label">
            click!
        </span>
    </div>
</body>
</html>
