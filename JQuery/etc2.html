<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etc2 - target Move</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/etc2.js"></script>
    <style>
        .circleWrap{
            width: 430px; height: 430px; border: 1px solid black; margin: 0 auto; position: relative;
        }
    </style>
</head>
<body>
    <div class="circleWrap">
        <div class="circle"></div>
        <button id="btnMoveCircle">움직이기</button>
    </div>
    <div class="circleWrap">
        <div class="circleDetail"></div>
        <fieldset>
            <label for="xpos">x좌표입력</label>
            <input type="text" id="xpos">
            <label for="ypos">y좌표입력</label>
            <input type="text" id="ypos">
            <button id="btnDetailMove">실행!</button>
        </fieldset>
    </div>
    <div class="circleWrap">
        <div class="circleKey"></div>
    </div>
</body>
</html>
