<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etc1 - 선택자</title>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script src="js/etc_1.js"></script>
</head>
<body>
    <!-- *case. 1 대상 글자색 바꿔보기 -->
    <div>div1</div>
    <div>div2</div>
    <div>div3</div>

    <!-- *case. 2 button을 click 하면 alert띄우기-->
    <button id="btnCheck">인사해라.</button>

    <!-- *case. 3 button을 click 하면 panel의 border 변경하기 -->
    <div id='panel'>
        나 panel, border 넣어봐. <br>
        <button id="btnAddBorder">border 넣기</button>
    </div>

    <!-- todo.1 버튼(#btnTextChange)을 클릭하면 패널(#panel2)의 글자 크기와 색, 외곽선을 변경해보라. -->

    <div id="panel2">
        나 panel, 글자 크기, 색상, 외곽선 바꾸기
        <button id="btnTextChange">크기와 색, 외곽선 바꾸기</button>
    </div>
</body>
</html>
