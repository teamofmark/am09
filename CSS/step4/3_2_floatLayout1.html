<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float Layout - 1</title>
    <link rel="stylesheet" href="css/3_2_floayLayout1.css">
</head>
<body>
    <!-- header>h1{header}+p{headerArea}+nav>h2{Navigation}+p{navArea} -->
    <header>
        <h1>header</h1>
        <p>headerArea</p>
        <nav>
            <h2>Navigation</h2>
            <p>navArea</p>
        </nav>
    </header>
    <!-- .wrap>(aside>h2{Aside}+p{AsideArea})+(section>h2{Section}+p{sectionArea}+article>h3{Article}+p{articleArea}) -->
    <div class="wrap">
        <aside>
            <h2>Aside</h2>
            <p>AsideArea</p>
        </aside>
        <section>
            <h2>Section</h2>
            <p>sectionArea</p>
            <article>
                <h3>Article</h3>
                <p>articleArea</p>
            </article>
        </section>
    </div>
    <!-- footer>h2{Footer}+p{footerArea} -->
    <footer>
        <h2>Footer</h2>
        <p>footerArea</p>
    </footer>
</body>
</html>
