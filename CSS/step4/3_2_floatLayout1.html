<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>floatLayout 1</title>
    <link rel="stylesheet" href="css/3_2_floatLayout1.css">
</head>
<body>
    <!-- todo header>h1{header}+p{headerContent}+nav>h2{Navigation}+p{NavigationContent} -->
    <header>
        <h1>header</h1>
        <p>headerContent</p>
        <nav>
            <h2>Navigation</h2>
            <p>NavigationContent</p>
        </nav>
    </header>
    <!-- todo .wrap>(aside>h2{aside}+p{asideContent})+(section>h2{section}+p{sectionContent}+article>h3{Article}+p{ArticleContent}) -->
    <div class="wrap">
        <aside>
            <h2>aside</h2>
            <p>asideContent</p>
        </aside>
        <section>
            <h2>section</h2>
            <p>sectionContent</p>
            <article>
                <h3>Article</h3>
                <p>ArticleContent</p>
            </article>
        </section>
    </div>
</body>
</html>
