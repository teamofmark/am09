<html lang="en">
<head>

    <title>css spacing</title>
    <link rel="stylesheet" href="css/1_spacing.css">
</head>
<body>
    <div class="firstDiv">
        첫번째 div
        <p>첫번째 div 안에 p</p>
    </div>
    <div class="secondDiv">
        두번째 div
        <p>
            두번째 div내 p
        </p>
    </div>
    <div class="centerDiv">
        중앙 위치 하는 div
        <p>
            중앙 div 내 p
        </p>
    </div>
</body>
