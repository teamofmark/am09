<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border</title>
    <link rel="stylesheet" href="css/4_border.css">
</head>
<body>
    <div class="singleBox">4면 모두 동일 굵기,형태,색상 외곽선</div>
    <div class="multiBox">각면 다른 굵기,형태,색상 외곽선</div>
    <div class="grooveBox">음영 안쪽 처리 외곽선</div>
    <div class="ridgeBox">음영 바깥 쪽 처리 외곽선</div>
    <div class="insetBox">오목하게 보이는 외곽선</div>
    <div class="outsetBox">볼록하게 보이는 외곽선</div>
    <div class="radiusBox">모서리를 둥글게 만든 외곽선</div>
    <div class="circleBox">원으로 변한 외곽선</div>
</body>
</html>
