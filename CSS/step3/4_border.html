<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border style</title>
    <link rel="stylesheet" href="css/4_border.css">
</head>
<body>
    <!-- ? .Box*8>{테두리박스.} -->
    <div class="singleBox">동일한 굵기, 형태, 색상 테두리박스.</div>
    <div class="multiBox">각기 다른 굵기, 형태, 색상 테두리박스.</div>
    <div class="grooveBox">음영 안쪽 테두리박스.</div>
    <div class="ridgeBox">음영 바깥쪽 테두리박스.</div>
    <div class="insetBox">들어가보이는 테두리박스.</div>
    <div class="outsetBox">나와보이는 테두리박스.</div>
    <div class="radiusBox">모서리를 둥글게 만든 테두리박스.</div>
    <div class="circleBox">원형 테두리박스.</div>
</body>
</html>
