<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border style</title>
    <link rel="stylesheet" href="css/4_border.css">
</head>
<body>
    <div class="singleBox">
        동일한 굵기와 형태, 색상의 borderBox.
    </div>
    <div class="multiBox">
        각기 다른 굵기와 다른 형태, 다른 색상의 borderBox.
    </div>
    <div class="grooveBox">
        안 쪽 음영 borderBox.
    </div>
    <div class="ridgeBox">
        바깥 쪽 음영 borderBox.
    </div>
    <div class="insetBox">
        들어가 보이는 borderBox.
    </div>
    <div class="outsetBox">
        나와 보이는 borderBox.
    </div>
    <div class="radiusBox">
        모서리를 둥글게 만든 borderBox.
    </div>
    <div class="circleBox">
        circle borderBox.
    </div>
</body>
</html>
