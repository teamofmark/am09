<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list style</title>
    <link rel="stylesheet" href="css/3_list.css">
</head>
<body>
    <ul>
        <li class="circle">outlined Circle bullet</li>
        <li class="disc">fill Circle bullet</li>
        <li class="square">square bullet</li>
    </ul>
    <ol>
        <li class="decimal">10진수 불릿</li>
        <li class="lower-alpha">소문자 알파벳 불릿</li>
        <li class="upper-alpha">대문자 알파벳 불릿</li>
        <li class="lower-roman">소문자 로마자 불릿</li>
        <li class="upper-roman">대문자 로마자 불릿</li>
        <li class="none">불릿 삭제</li>
    </ol>
    <ul class="custom">
        <li>bullet image list</li>
        <li>bullet image list</li>
        <li>bullet image list</li>
        <li>bullet image list</li>
        <li>bullet image list</li>
    </ul>
</body>
</html>
