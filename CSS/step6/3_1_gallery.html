<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>gallery</title>
    <link rel="stylesheet" type="text/css" href="css/3_1_gallery.css">
</head>

<body>
    <!-- 
        1. 전체 tag css reset
        2. .wrap - 너비설정 , 가운데 배치
        3. header 작업
        - logo : color / nav 우측으로 보내기(float? margin? position?)
        4. nav line
        - 상,하 라인(누구에게줄까) / 항목별 라인(왼쪽으로 or 오른쪽으로 볼건지 )

        5. list배치
        - ul.picList  -> float cancel
        - ul li -> float / margin.(left: 1,4,7을제외 / right: 3,6,9를 제외해야 하는 상황)
        - margin부분 제외 나머지 width / 3해서 각각 li에게 너비설정.

        6. hoverEvent
        - li? a? img? 올렸을 때 img가 밝아지게 만들기.
     -->
    <div class="wrap">
        <header>
            <h1>Photography</h1>
            <nav>
                <ul>
                    <li><a href="#">home</a></li>
                    <li><a href="#">gallery</a></li>
                    <li><a href="#">about</a></li>
                    <li><a href="#">blog</a></li>
                    <li><a href="#">contact</a></li>
                </ul>
            </nav>
        </header>

        <ul class="picList">
            <li><a href="#"><img src="images/sampleG_01.jpg" alt="풍경1" /></a></li>
            <li><a href="#"><img src="images/sampleG_02.jpg" alt="풍경2" /></a></li>
            <li><a href="#"><img src="images/sampleG_03.jpg" alt="풍경3" /></a></li>
            <li><a href="#"><img src="images/sampleG_04.jpg" alt="풍경4" /></a></li>
            <li><a href="#"><img src="images/sampleG_05.jpg" alt="풍경5" /></a></li>
            <li><a href="#"><img src="images/sampleG_06.jpg" alt="풍경6" /></a></li>
            <li><a href="#"><img src="images/sampleG_07.jpg" alt="풍경7" /></a></li>
            <li><a href="#"><img src="images/sampleG_08.jpg" alt="풍경8" /></a></li>
            <li><a href="#"><img src="images/sampleG_09.jpg" alt="풍경9" /></a></li>
        </ul>

        <footer>
            copyright ⓒ 2020 teamofmark. all rights reserved.
        </footer>

    </div>
</body>

</html>
