<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>property</title>
    <link rel="stylesheet" href="css/3_property.css">
</head>
<body>
    <div class="displayProperty">
        <span>display: block</span>
        <span>display: inline-block</span>
        <span>display: inline</span>
        <span>display: none</span>
    </div>
    <div class="visibilityProperty">
        <span>visibility : visible</span>
        <span>visibility : hidden</span>
        <input type="checkbox" id="showTable">
        <label for="showTable">show Table!</label>
        <table>
            <tr>
                <td>
                    table visibility : collapse;
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
