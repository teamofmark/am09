<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css 작성방식</title>
    <link rel="stylesheet" href="css/1_style.css">
    <!-- ?outerStyle : 외부에 별도 css file을 만들어 관리하는 방식(후순위) - publisher기본사용방식 -->
    <style>
        body{
            color: blue;
        }
    </style>
    <!-- ? innerStyle : head에 삽입하고 간단한 example Page / 간단한 기능 시험 용도(차상위) -->
</head>
<body>
    <!-- ? style="color: red;" inlineStyle : pub기준(x) / 운영중인 system에서 임시 or 긴급 수정사항이 발생시(최상위) -->
    css 사용 방식에 대해 알아보자.
</body>
</html>
