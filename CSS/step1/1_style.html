<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css 작성방식</title>
    <link rel="stylesheet" href="css/1_style.css">
    <!-- * outerCSS : 후순위 적용-->
    <style>
        body{
            color: green;
        }
    </style>
    <!-- *innerCSS : 차순위 적용 -->
</head>
<body style="color: blue;">
    <!-- *inlineCSS : tag에 직접적용. 최우선순위 -->
    css 작성 방식에 대하여 알아보자.
</body>
</html>
