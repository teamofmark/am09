<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 작성 방식</title>
    <link rel="stylesheet" href="css/1_style.css">
    <!--  outerCSS / 외부스타일방식 : 제일 중요한 방식 (적용순서가 최 후순위) -->
    <style>
        p{
            color: blue; font-size: 52px;
        }
    </style>
    <!-- innerCSS / 내부스타일방식 : 단일 페이지 제작 시나 샘플링할 때 사용 하는 방식(적용순서가 차 순위) -->
</head>
<body>
    <p>css 사용 방식에 대해 먼저 알아보자.</p>
    <!-- style="color: red; font-size: 24px;" inlineCSS / 태그직접적용스타일방식 :  작업이 완료된 이후 혹은 유지 보수 단계에서 임시로 적용하는 방식(적용순서가 최우선)-->
</body>
</html>
