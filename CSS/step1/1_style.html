<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css 작성방식</title>
    <link rel="stylesheet" href="css/1_style.css">
    <!-- ? outerStyle : file을 외부로 분리시켜 적용. - 우리 주 작성방식. -->
    <style>
        body{
            color: blue;
        }
    </style>
    <!-- ? innerStyle : 현재 file 내에 적용. - file안에 범위가 갇힘.(다른file적용불가) -->
    <!-- * 그렇기 때문에 일정 화면을 test 하거나 dummyStyle(임시스타일) 작업 할 때 사용. -->
</head>
<body style="font-size: 24px;">
    <!-- ? inlineStyle : 각 tag에 직접 적용. - 가장 높은 우선권(적용)을 가짐. -->
    <!-- * 급하게 넣거나 작업자가 아닌 사람이 적용 할 때. -->
    css 사용 방식에 대해 알아보자.
    <p>
        진짜 내려지나?
    </p>
</body>
</html>
