<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plugin(JQuery) - bxslider</title>
    <script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>
    <script src="js/jquery.bxslider.js"></script>
    <script src="js/jquery.fitvids.js"></script>
    <script src="js/bxslider.js"></script>
    <link rel="stylesheet" href="css/import.css">
</head>
<body>
    <ul class="slider">
        <li>
            <iframe src="https://www.youtube.com/embed/jaNaWklhUHQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </li>
        <li>
            <img src="images/wallpaper1.jpg" alt="sliderExample" title="slide-0">
        </li>
        <li>
            <img src="images/wallpaper2.jpg" alt="sliderExample" title="slide-1">
        </li>
        <li>
            <img src="images/wallpaper3.jpg" alt="sliderExample" title="slide-2">
        </li>
        <li>
            <img src="images/wallpaper4.jpg" alt="sliderExample" title="slide-3">
        </li>
    </ul>
    <!-- * newPager 
    <div class="newPager"></div>-->

    <!-- *customPager -->
    <ol class="customPager">
        <li><a href="" data-slide-index="0">1</a></li>
        <li><a href="" data-slide-index="1">2</a></li>
        <li><a href="" data-slide-index="2">3</a></li>
        <li><a href="" data-slide-index="3">4</a></li>
        <li><a href="" data-slide-index="4">5</a></li>
    </ol>

    <!-- *newControler -->
    <div class="newControler">
        <span class="btn_prev"></span>
        <span class="btn_next"></span>
    </div>
</body>
</html>
