<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQuery - plugin bxSlider</title>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="js/jquery.bxslider.js"></script>
    <script src="js/jquery.fitvids.js"></script>
    <script src="js/custom.bxslider.js"></script>
    <link rel="stylesheet" href="css/import.css">
</head>
<body>
    <ul class="bxSlider">
        <li><img src="images/wallpaper1.jpg" alt="highQualityWallpaper1" title="wallpaper01"></li>
        <li><img src="images/wallpaper2.jpg" alt="highQualityWallpaper2" title="wallpaper02"></li>
        <li><img src="images/wallpaper3.jpg" alt="highQualityWallpaper3" title="wallpaper03"></li>
        <li><img src="images/wallpaper4.jpg" alt="highQualityWallpaper4" title="wallpaper04"></li>
    </ul>
    <div class="newPager"></div>
    <ol class="customPager">
        <li><a href="" data-slide-index="0"><img src="images/wallpaper1.jpg" alt="wallpaperThumbNail1"></a></li>
        <li><a href="" data-slide-index="1"><img src="images/wallpaper2.jpg" alt="wallpaperThumbNail2"></a></li>
        <li><a href="" data-slide-index="2"><img src="images/wallpaper3.jpg" alt="wallpaperThumbNail3"></a></li>
        <li><a href="" data-slide-index="3"><img src="images/wallpaper4.jpg" alt="wallpaperThumbNail4"></a></li>
    </ol>
    <div class="newControler">
        <span class="btn_prev"></span>
        <span class="btn_next"></span>
    </div>
</body>
</html>
