<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>a - 지정된 위치로 이동 시키기</title>
    <style>
        html,body{
            margin: 0; height: 100%; scroll-behavior: smooth;
        }
        /* ul#menu{
            position: fixed; right: 0; top: 0; background-color: white;
        } */
        div{
            height: 100%;
        }
        #page1{
            background-color: palevioletred;
        }
        #page2{
            background-color: palegoldenrod;
        }
        #page3{
            background-color: palegreen;
        }
        #page4{
            background-color: paleturquoise;
        }
    </style>
</head>
<body>
    <!-- (ul#menu>li*5>a{page$바로가기})+(#page$*4>{$page}+a{메뉴로}) -->
    <ul id="menu">
        <li><a href="">page1바로가기</a></li>
        <li><a href="">page2바로가기</a></li>
        <li><a href="">page3바로가기</a></li>
        <li><a href="">page4바로가기</a></li>
        <li><a href="">page5바로가기</a></li>
    </ul>
    <div id="page1">1page<a href="">메뉴로</a></div>
    <div id="page2">2page<a href="">메뉴로</a></div>
    <div id="page3">3page<a href="">메뉴로</a></div>
    <div id="page4">4page<a href="">메뉴로</a></div>
</body>
</html>
