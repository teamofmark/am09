<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hyperLink</title>
    <style>
        html,body{
            height: 100%;
        }
        #targetAnchor{
            height: 100%;
        }
    </style>
</head>
<body>
    <h1>hyperLink List</h1>
    <p>
        hyperLink를 이용하여 원하는 URL 및 URL내 위치로 이동 하는 법,
        file download link 및 기타 다른 기능도 배워보자.
    </p>
    <ul>
        <li><a href="https://www.naver.com" target="_self">NAVER 바로가기</a></li>
        <li><a href="https://www.daum.net" target="_blank">DAUM 바로가기</a></li>
        <!-- 
            a Tag의 attr href는 불러올 url 및 type을 설정하고 taget으로 불러오는 방식을 정할 수 있다.
            _self는 현페이지에서 _blank는 새 탭에서.
         -->
        <li><a href="downloadExample.zip">file Download</a></li>
        <!-- 
            href에 해당 경로에 맞는 파일이름과 확장명을 적으면 download기능을 활성화 할 수 있다.
         -->
        <li><a href="mailto:teamofmark@gmail.com?subject=hello!">mail보내기</a></li>
        <!-- 
            mailto: 로 선언된 경우 해당 메일 주소와 ?subject=제목내용(기본 영문상태지원)으로 제목표시까지
            한번에 기입 된 상태를 만들 수 있다.
         -->
        <li><a href="tel:+821056658312">전화걸기</a></li>
        <!-- 
            tel: 로 선언하면 전화걸기 기능이 가능해지고 mobile에서는 dialPad가 자동으로 열리며 번호 기입상태를 완성한다.
         -->
        <li><a href="#targetAnchor">바로가기TEST</a></li>
    </ul>
    <div id="targetAnchor">
        목표지점
    </div>
</body>
</html>
