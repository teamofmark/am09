<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hyper Link - 만능버튼</title>
</head>
<body>
    <h1>hyperLink List</h1>
    <p>
        hyperLink를 이용하여 원하는 url 및 url 내 위치로 이동하는 법, 그외 기타 다양한 버튼 액션을 배워보자.
    </p>
    <ul>
        <li><a href="https://www.naver.com" target="_blank">naver button</a></li>
        <li><a href="https://www.daum.net" target="_self">daum button</a></li>
        <!-- 
            target 값은 현재 시스템에서 세션을 유지해야 할 경우는 _self / 
            그럴필요가 없을 때 (아예 시스템이 바뀌는 상황)는 _blank로 새탭으로 열어줘야함.
        -->
        <li><a href="">button</a></li>
        <li><a href="">button</a></li>
        <li><a href="">button</a></li>
        <li><a href="">button</a></li>
    </ul>
</body>
</html>
