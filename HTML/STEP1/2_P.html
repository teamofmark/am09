<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paragraph Style Tag</title>
</head>
<body>
    <p>
        일부를 <b>진하게</b> 표현하기 <br>
        일부를 <strong>진하게</strong> 표현하기 <br>
        일부를 <i>기울이기</i> <br>
        일부를 <em>기울이기</em> <br>
        일부의 <mark>색상강조</mark> <br>
        <sup>위</sup>첨자 <br>
        <sub>아래</sub>첨자 <br>
    </p>
</body>
</html>
