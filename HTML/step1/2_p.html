<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paragraph style Tag</title>
</head>
<body>
    <p>
        paragraph Test <br>
        <!-- 
            ? br = line Break. 줄바꿈
            ! <br><br>.. 이런행위 금지.
        -->
        <b>진하게</b>
        <strong>진하게(청각적신호강조)</strong><br>

        <i>기울기</i>
        <em>기울기</em> <br>
        <!-- ?외국어나 분류적 성격을 띄는 단어(전문기술용어, 학술용어..)처럼 다른 text와 구별되는 text. -->
    </p>
</body>
</html>
