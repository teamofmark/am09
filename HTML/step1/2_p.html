<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paragraph style Tag</title>
</head>
<body>
    <p>
        <b>진하게</b>
        <strong>진하게(의미강조)</strong><br>
        
        <i>기울이기</i>
        <em>기울이기(의미(분류적)강조)</em><br>
        
        <mark>색상</mark>(강조) <br>

        <sup>위</sup>첨자
        <sub>아래</sub>첨자 <br>

        <s>취소선</s>
        <del>취소선</del><br>
        
        <u>밑줄</u><br>

        일부를 <small>작게</small> 
        일부를 <big>크게</big> <br>

        <kbd>키보드활자표기</kbd> <br>
        <code>개발언어 및 코드</code> <br>
        <samp>프로그램 처리 결과 표시</samp>
    </p>
    <p>
        테스트를해보자
    </p>
</body>
</html>
