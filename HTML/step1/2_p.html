<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paragraph style Tag</title>
</head>
<body>
    <p>
        <b>진하게</b>
        <strong>진하게(의미강조)</strong> <br>
        <i>기울이기</i>
        <em>기울이기</em> <br>
        <!-- HTML4에서 Italic으로 사용된 기울임체인 이 태그는 html5에 와서는 외국어나 분류적인 성격을 띄는 단어, 전문기술용어, 손글씨 등 처럼 다른 텍스트와 구별 되는 텍스트를 표현 할 때 사용된다. -->
        <mark>색상</mark>강조 <br>
        <sup>위</sup>첨자
        <sub>아래</sub>첨자 <br>
        <s>취소선</s>
        <del>취소선</del><br>

        <u>밑줄</u><br>
        <small>일부를</small> 작게
        <big>일부를</big> 크게 <br>
        
        <kbd>키보드활자</kbd>
        <code>컴퓨터코드</code>
        <samp>program 처리 결과 표시</samp> <br>
    </p>
    <hr>
    <blockquote>block 속성 인용문</blockquote>
    <q>인용문</q>
</body>
</html>
