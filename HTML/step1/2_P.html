<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paragraph Style Tag</title>
</head>
<body>
    <p>
        <b>진하게</b>
        <strong>진하게(의미강조)</strong>
        <br>
        <!-- ? lineBreak(줄바꿈) -> br -->
        <i>기울기</i>
        <em>기울기</em>
        <br>
        <mark>색상</mark>글씨
        <br>
        <sup>위</sup>첨자<br>
        <!-- superScript -->
        <sub>아래</sub>첨자<br>
        <!-- subScript -->
        <s>취소선</s><br>
        <del>취소선(실제data상 삭제)</del><br>
        <u>밑줄</u><br>
        
        <small>일부를 작게</small><br>
        <cite>저작권관련표기</cite>
        <big>일부를 크게</big> 표현해<br>
        <kbd>ctrl+c</kbd><br>
        <code>컴퓨터코드</code><br>
        <samp>프로그램 처리 결과 표시</samp>
    </p>
    <hr>
    <!-- ? Horizontal Rule -->
    <blockquote>block 속성의 인용문</blockquote>
    <q>inline 속성의 인용문</q>
</body>
</html>
