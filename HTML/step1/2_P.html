<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P - Paragraph</title>
</head>
<body>
    <!-- 
        * 문단 Tag(p)는 최소 한 줄 이상의 문장이 구성되어야 사용 가능.
    -->
    <p>
        <b>진하게</b>
        <strong>진하게</strong>
        <br>
        <i>기울기</i>
        <em>기울기</em>
        <br>
        <mark>색상강조</mark>
    </p>
    <p>
        paragraph Example - 2
    </p>
</body>
</html>
