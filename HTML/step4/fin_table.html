<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparison of models</title>
    <style>
        table{
            width: 50%; margin: 0 auto;
        }
        table, table tr td{
            border : 1px solid black;
        }
    </style>
</head>
<body>
    <table>
        <caption>Comparison of models</caption>
        <thead>
            <tr>
                <th>Model</th>
                <th>OS</th>
                <th>Display</th>
                <th>RAM</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Samsung Galaxy S7</td>
                <td rowspan="2">Android</td>
                <td>5.1"</td>
                <td>4GB</td>
            </tr>
            <tr>
                <td>Sony Xperia Z5</td>
                <!-- <td>Android</td> -->
                <td>4.6"</td>
                <td rowspan="2">2GB</td>
            </tr>
            <tr>
                <td>Apple iPhone 6s</td>
                <td>IOS</td>
                <td>4.7"</td>
                <!-- <td>2GB</td> -->
            </tr>
        </tbody>
    </table>
</body>
</html>
