    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo. Table Span / 병합실습</title>
    <style>
        table{
            width: 100%;
            height: 300px;
        }
        table td{
            font-size: 40px;
            border:1px solid black;
        }
        table td[colspan],
        table td[rowspan]{
            background-color:red; color:white;
        }
    </style>
</head>
