<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo. Table Span / 병합실습</title>
    <style>
        table{
            width: 100%;
            height: 300px;
        }
        table td{
            font-size: 40px;
            border:1px solid black;
        }
        table td[colspan],
        table td[rowspan]{
            background-color:red; color:white;
        }
    </style>
</head>
<body>
    <!--
        todo. 1. 문제의 테이블 구조는 shorthand 방식으로 작성 해볼 것
        todo. 2. 테이블 구조를 볼 때는 몇행에 몇열인지를 우선 판단 후 추후에 병합 (한번에 병합 x)
        todo. table>caption{-______-ㅋ}+(tbody>tr*3>td*10{-$})
    -->
    <table>
        <caption>-______-ㅋ</caption>
        <tbody>
            <tr>
                <td colspan="5">1-1 ~ 1-5</td>
                <!-- <td>1-2</td>
                <td>1-3</td>
                <td>1-4</td>
                <td>1-5</td> -->
                <td rowspan="3">1-6 ~ 3-6</td>
                <td>1-7</td>
                <td>1-8</td>
                <td>1-9</td>
                <td rowspan="2">1-10 ~ 2-10</td>
            </tr>
            <tr>
                <td>2-1</td>
                <td>2-2</td>
                <td>2-3</td>
                <td>2-4</td>
                <td>2-5</td>
                <!-- <td>2-6</td> -->
                <td>2-7</td>
                <td>2-8</td>
                <td>2-9</td>
                <!-- <td>2-10</td> -->
            </tr>
            <tr>
                <td colspan="2">3-1 ~ 3-2</td>
                <!-- <td>3-2</td> -->
                <td>3-3</td>
                <td>3-4</td>
                <td>3-5</td>
                <!-- <td>3-6</td> -->
                <td colspan="4">3-7 ~ 3-10</td>
                <!-- <td>3-8</td>
                <td>3-9</td>
                <td>3-10</td> -->
            </tr>
        </tbody>
    </table>
</body>
</html>
