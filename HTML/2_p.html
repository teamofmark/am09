<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>문자 스타일 태그</title>
</head>

<body>
    <p>
        <b>진하게</b> <br>
        <strong>진하게</strong> <br>
        <br>
        <i>기울기</i> <br>
        <em>기울기</em> <br>
        <br>
        
        <mark>색상</mark>강조 <br>
        <br>
        첨자<sup>위</sup>
        첨자<sub>아래</sub>
        <br>
        <s>취소선</s> <br>
        <del>취소선</del> <br>
        <br>
        <u>밑줄</u> <br>
        <!-- ? 철자 및 오류 정정 / 각 언어별 고유명사 표현 등의 성격일 때 -->
        일부를<small>작게</small>
        일부를<big>크게</big> <br>
        <br>
        <kbd>keyboard 활자</kbd>
        <code>programing Code</code>
        <samp>programing Result Print</samp>
    </p>
    <hr>
    <blockquote>
        block 속성 인용문
    </blockquote>
    <q>inline 속성 인용문</q>
    <!-- 
        ? display - 
        ! block : 기본 width: 100%, row x 1 을 통채로 다 사용. - 가장 큰 단위 중 하나
        ! inline-block : 기본 contentWidth, 간격, 너비(크기) 수정 가능 - 중간 단위.
        ! inline : 기본 contentWidth, 간격,너비(크기) 수정 불가. - 가장 작은 단위 중 하나
     -->
</body>
</html>
