<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paragraph</title>
</head>
<body>
    <p>
        <b>진하게</b>
        <strong>진하게 (강조)</strong> <br>
        
        <i>기울이기</i>
        <em>기울이기 (강조)</em><br>
        
        <mark>색상</mark>강조 <br>
        
        <sup>위</sup>첨자
        <sub>아래</sub>첨자 <br>

        <s>취소선</s>
        <del>취소선(실제 data상 삭제)</del> <br>

        <u>밑줄</u> <br>

        일부를<small>작게</small>
        일부를<big>크게</big><br>

        <kbd>키보드활자</kbd>
        <code>컴퓨터코드</code>
        <samp>프로그램 처리 결과 표시</samp>
    </p>
    <hr>
    <!-- 
    ! hr 태그는 위와 아래의 주제 자체가 바뀐다는 데 의미를 둔다. html4에서 처럼 그저 형식적인 구분선의 역할이 아니다.
     -->
</body>
</html>
