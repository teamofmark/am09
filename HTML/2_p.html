<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paragraph Tag (inline's Tag)</title>
</head>

<body>
    <p>
        <b>진하게</b>
        <strong>진하게(의미강조-음성)</strong>
        <br>
        <i>기울이기</i>
        <!-- ? HTML4에서 italic으로 사용된 기울임체. html5에 와서는 외국어나 분류적 성격을 띄는 단어, 전문기술용어, 손글씨 등 과 같이 다른 텍스트와 구별되는 것들.-->
        <em>기울이기</em>
        <!-- ? emphasized (강조하다) - 성조.음의 ↑↓로 -->
    </p>
</body>

</html>
