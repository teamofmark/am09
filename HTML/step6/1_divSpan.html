<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div Layout</title>
    <style>
        header {
            background-color: red;
            margin-bottom: 20px;
            text-align: center;
        }

            header nav li {
                display: inline-block;
                width: 19%;
                background-color: blue;
                color: white;
            }

        section {
            background-color: red;
            margin-bottom: 20px;
        }

            section > * {
                height: 500px;
                display: inline-block;
            }

            section article {
                background-color: yellow;
                width: 80%;
            }

            section aside {
                background-color: green;
                width: 18%;
            }

        footer {
            text-align: center;
            background-color: orange;
        }
    </style>
</head>
<body>
    <!-- 
        ? 기존 공간 Tag - div / span 만 존재함.
        * 전용 공간 Tag(semantic) - header,section,article,footer....들이 생겨남.
        ? 왜 태어났는지..알아보자.
     -->
     <!-- todo .header>span{globalHeader}+.nav>ul>li*5{menu$} -->
     <header>
        <span>globalHeader</span>
        <nav>
            <ul>
                <li>menu1</li>
                <li>menu2</li>
                <li>menu3</li>
                <li>menu4</li>
                <li>menu5</li>
            </ul>
        </nav>
    </header>
     <!-- todo .section>(.article>span{text})+(.aside>span{quickMenu}) -->
     <section>
        <article><span>text</span></article>
        <aside><span>quickMenu</span></aside>
     </section>
     <!-- todo .footer>span{global footer} -->
     <footer><span>global footer</span></footer>
</body>
</html>
