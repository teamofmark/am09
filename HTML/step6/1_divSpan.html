<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div Layout</title>
    <style>
        .header {
            background-color: red;
            margin-bottom: 20px;
            text-align: center;
        }

            .header .nav li {
                display: inline-block;
                width: 19%;
                background-color: blue;
                color: white;
            }

        .section {
            background-color: red;
            margin-bottom: 20px;
        }

            .section > * {
                height: 500px;
                display: inline-block;
            }

            .section .article {
                background-color: yellow;
                width: 80%;
            }

            .section .aside {
                background-color: green;
                width: 18%;
            }

        .footer {
            text-align: center;
            background-color: orange;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>globalHeader</span>
        <div class="nav">
            <ul>
                <li>menu 1</li>
                <li>menu 2</li>
                <li>menu 3</li>
                <li>menu 4</li>
                <li>menu 5</li>
            </ul>
        </div>
    </div>
    <!-- ? div : divide - 분할하다. 나누다. -->
    <div class="section">
       <!-- todo. (.article>span{text})+(.aside>span{quick Menu}) -->
       <div class="article"><span>text</span></div>
       <div class="aside"><span>quick Menu</span></div>
    </div>
    <div class="footer">
        <span>global footer</span>
    </div>
</body>
</html>
