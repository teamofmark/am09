<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5에서 새로 추가 된 잔여 tag</title>
</head>
<body>
    <ul>
        <li>
            <figure>
                <img src="https://via.placeholder.com/200" alt="undefined">
                <figcaption>
                    <strong>
                        119,000
                        <mark>43%</mark>
                    </strong>
                    <h3>칼린 미닛+퀼팅지갑</h3>
                    <a href="targetURL">칼린</a>
                </figcaption>
            </figure>
        </li>
    </ul>
    <time datetime="2021-06-24">2021.06.24</time>
    <!--
        ? 날짜, 시간 기록을 하는 time 마크업은
        ? 1. datetime은 브라우저에서 인식하는 날짜 부분이다. yyyy-mm-dd 형식을 따른다.
        ? 날짜만 ? 2016-06-12, 시간만? 09:00:00, Z는 그리니치 시간대를 나타내는 Zulu의 약자 
        ? 2. pubdate(문서작성날짜)는 삭제-
        ? 3. 브라우저에 표시될 내용
    -->
</body>
</html>
