<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5에서 새로 추가 된 잔여 tag</title>
</head>
<body>
    <ul>
        <li>
            <figure>
                <img src="https://via.placeholder.com/200" alt="undefined">
                <figcaption>
                    <strong>
                        119,000
                        <mark>43%</mark>
                    </strong>
                    <h3>칼린 미닛+퀼팅지갑</h3>
                    <a href="targetURL">칼린</a>
                </figcaption>
            </figure>
        </li>
    </ul>
    <time datetime="2021-06-24">2021.06.24</time>
    <!--
        ? 날짜, 시간 기록을 하는 time 마크업은
        ? 1. datetime은 브라우저에서 인식하는 날짜 부분이다. yyyy-mm-dd 형식을 따른다.
        ? 날짜만 ? 2016-06-12, 시간만? 09:00:00, Z는 그리니치 시간대를 나타내는 Zulu의 약자 
        ? 2. pubdate(문서작성날짜)는 삭제-
        ? 3. 브라우저에 표시될 내용
    -->
    <progress value="22" max="100"></progress>
    <meter value="91" max="100" min="10" high="90" low="20"></meter>
    <ruby>
        漢 <rt>かん</rt>
    </ruby>
    <!-- ? 일본어를 사용 할 시에 일반적인 읽기방법과 다르게 읽는 경우 rt로해당 부분을 처리해준다. 이외 부가문장이 필요하면 <rp></rp>사용-->
    <address>
        실제 주소 + 웹상 주소 + email 주소 ...contact(전화번호,우편번호...)
    </address>
    <!-- ? IE 지원불가 -->
    <details>
        <summary>요약 주제 단어</summary>
        <p>주제 요약 문단 1</p>
        <p>주제 요약 문단 2</p>
    </details>
    <ul>
        <li>User <bdi>경로들</bdi> </li>
        <li>User <bdi>hrefs</bdi> </li>
        <li>User <bdi>jdoe</bdi> </li>
        <li>User <bdi>إيان</bdi> </li>
    </ul>
    <!-- ? bdi는 자신의 외부 text와 다른 format으로 규정되는 text를 분리하는 용도. -->
</body>
</html>
