<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5에서 추가된 Tag's</title>
</head>
<body>
    <figure>
        <img src="https://via.placeholder.com/250" alt="undefined">
        <figcaption>
            아직 정의되지 않은 이미지
        </figcaption>
    </figure>
    <ul>
        <li>
            <figure>
                <img src="https://via.placeholder.com/250" alt="productPlace">
                <figcaption>
                    <dl>
                        <dt>productName</dt>
                        <dd>productDescription</dd>
                        <dd>
                            <del>$180</del>
                            $80
                        </dd>
                    </dl>
                </figcaption>
            </figure>
        </li>
    </ul>
</body>
</html>
