<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5에서 새로 추가 된 Tag</title>
    <style>
        body > ul li{border:1px solid black; width:250px; list-style:none;}
        body > ul li figure{position:relative;}
        body > ul li figure img{width:100%;}
        body > ul li figure:hover figcaption{display:block;}
        body > ul li figure figcaption{display:none; position:absolute; width:100%; height:100%; background-color:rgba(0,0,0,0.5); left:0; top:0;}
        body > ul li figure figcaption dl{text-align:center; color:white; padding:0;}
        body > ul li figure figcaption dl dt{font-size:24px;}
        body > ul li figure figcaption dl dd{margin:0;}
    </style>
</head>
<body>
    <figure>
        <img src="https://via.placeholder.com/150" alt="undefined">
        <figcaption>
            아직 정의되지 않은 이미지
        </figcaption>
    </figure>
    <!-- ul>li>figure>img+figcaption>dl>dt{example}+dd*2{example} -->
    <ul>
        <li>
            <figure>
                <img src="https://via.placeholder.com/150" alt="imgExample">
                <figcaption>
                    <dl>
                        <dt>example Name</dt>
                        <dd>example Descript</dd>
                        <dd>example Price</dd>
                    </dl>
                </figcaption>
            </figure>
        </li>
    </ul>
    <!-- ! figure 장식의 목록 형태 = 장점: css제어 및 data연결이 원활 / 단점 : codeLine자체가 두꺼워진다. -->
    <time datetime="2024-07-29T10:35:00">2024년 7월 29일 오전 10시 35분</time> <br>
    <progress value="22" max="100"></progress> <br>
    <meter value="95" max="100" min="10" high="90" low="20"></meter>
    <ruby>
        韓 <rt>かん</rt>
    </ruby>
    <address></address>
</body>
</html>
