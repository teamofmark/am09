<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5에서 새로 추가 된 Tag</title>
</head>
<body>
    <figure>
        <img src="https://via.placeholder.com/150" alt="undefined">
        <figcaption>
            미정의 된 image.
        </figcaption>
    </figure>    
    <ul>
        <li>
            <figure>
                <img src="https://via.placeholder.com/150x250" alt="productExample">
                <figcaption>
                    <dl>
                        <dt>화이트갤럭시진주반지</dt>
                        <dd>250,000원</dd>
                        <dd>by럭스핸드 LUXE HAND</dd>
                    </dl>
                    <span>
                        럭스핸드
                    </span>
                </figcaption>
            </figure>
        </li>
    </ul>

    <time datetime="2022-06-20:10:50T09:00:00Z">2022년 6월 20일 오전 10시 50분</time>

    <progress value="10" max="100"></progress>
    <!-- ? 진행상황 / 실시간으로 / 상대수치 (100%) -->

    <meter value="10" max="100" high="90" low="20"></meter>
    <!-- 
        ?진행중인 상태를 progress가 담당한다면, 현재 사용량/집계량/소모된량 등의 정지된 산출값을 담당.
     -->
    <ruby>
        漢 <rt>かん</rt>
    </ruby>
</body>
</html>
