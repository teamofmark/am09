<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5에서 추가 된 잔여 tag</title>
    <style>
        body > ul li{border:1px solid black; width:250px; list-style:none;}
        body > ul li figure{position:relative;}
        body > ul li figure img{width:100%;}
        body > ul li figure:hover figcaption{display:block;}
        body > ul li figure figcaption{display:none; position:absolute; width:100%; height:100%; background-color:rgba(0,0,0,0.5); left:0; top:0;}
        body > ul li figure figcaption dl{text-align:center; color:white; padding:0;}
        body > ul li figure figcaption dl dt{font-size:24px;}
        body > ul li figure figcaption dl dd{margin:0;}
    </style>
</head>
<body>
    <figure>
        <img src="https://via.placeholder.com/250x250" alt="undefined">
        <figcaption>아직 정의되지않은 이미지</figcaption>
    </figure>
    <!-- todo. ul>li>figure>img+figcaption>dl>dt{exampleName}+dd{exampleDescript}+dd{examplePrice} -->
    <ul>
        <li>
            <figure>
                <img src="https://via.placeholder.com/250x250" alt="example">
                <figcaption>
                    <dl>
                        <dt>exampleName</dt>
                        <dd>exampleDescript</dd>
                        <dd>examplePrice</dd>
                    </dl>
                </figcaption>
            </figure>
        </li>
    </ul>

    <time datetime="YYYY-MM-DDTHH:MM:SS">2023년 06월 26일 오전 09시</time>
</body>
</html>
