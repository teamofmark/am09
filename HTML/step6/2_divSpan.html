<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div Layout</title>
    <style>
        header{
            background-color: red;
            text-align: center;
        }
        header ul li{
            background-color: blue; display: inline-block; width: 19%; color: white;
        }
        section{
            background-color: red; margin-bottom: 20px;
        }
        section article,
        section aside{
            display: inline-block; height: 500px;
        }
        section article{
            width: 80%; background-color: yellow; 
        }
        section aside{
            width: 18%; background-color: green;
        }
        footer{
            background-color: orange;
        }
    </style>
</head>
<body>
    <header>
        <h2>globalHeader</h2>
        <nav>
            <ul>
                <li>menu1</li>
                <li>menu2</li>
                <li>menu3</li>
                <li>menu4</li>
                <li>menu5</li>
            </ul>
        </nav>
        <!-- <span>menu1</span>
        <span>menu2</span>
        <span>menu3</span>
        <span>menu4</span>
        <span>menu5</span> -->
    </header>
    <section>
        <article>
            <span>text</span>
        </article>
        <aside>
            <span>quick Menu</span>
        </aside>
    </section>
    <footer>
        <span>global footer</span>
    </footer>
</body>
</html>
