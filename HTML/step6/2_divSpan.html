<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div Layout</title>
    <style>
        .header{
            background-color: red;
            text-align: center;
        }
        .header ul li{
            background-color: blue; display: inline-block; width: 19%; color: white;
        }
        .section{
            background-color: red;
        }
        .section .article{
            width: 80%; background-color: yellow; display: inline-block; height: 500px;
        }
        .section .aside{
            width: 18%; background-color: green; display: inline-block; height: 500px;
        }
        .footer{
            background-color: orange;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>globalHeader</span>
        <ul>
            <li>menu1</li>
            <li>menu2</li>
            <li>menu3</li>
            <li>menu4</li>
            <li>menu5</li>
        </ul>
        <!-- <span>menu1</span>
        <span>menu2</span>
        <span>menu3</span>
        <span>menu4</span>
        <span>menu5</span> -->
    </div>
    <div class="section">
        <div class="article">
            <span>text</span>
        </div>
        <div class="aside">
            <span>quick Menu</span>
        </div>
    </div>
    <div class="footer">
        <span>global footer</span>
    </div>
</body>
</html>
