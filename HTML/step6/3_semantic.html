<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>semantic Tag</title>
</head>
<body>
    <header>
        <p>
            모든 page에서 공통으로 사용하는 상단 영역.(global Element)
            page 상단 logo(h1), navigation(nav), sideBox(div) 등이 들어간다.
        </p>
        <h1>LOGO</h1>
        <nav>
            <ul>
                <li>
                    <a href="">menu</a>
                </li>
            </ul>
        </nav>
        <div>
            <input type="button" value="wishList">
            <input type="button" value="signIn">
        </div>
    </header>
</body>
</html>
