<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>semantic Tag's</title>
</head>
<body>
    <header>
        <p>
            모든 page에서 공통으로 사용하는 (global)상단 영역. <br>
            page 상단 logo(h1), navigation(nav), sideBox(div)등이 들어간다.
            통상적으론 변경이 절대 일어나면 안되는 영역.
        </p>
        <!-- h1{logo}+(nav>ul>li>a{menu})+div>input:button+a{login}+a{cart} -->
        <h1>logo</h1>
        <nav>
            <ul>
                <li><a href="">menu</a></li>
            </ul>
        </nav>
        <div>
            <input type="button" value="">
            <a href="">login</a>
            <a href="">cart</a>
        </div>
    </header>
</body>
</html>
