<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div,span Layout</title>
    <style>
        .header,
        .section{
            background-color: red;
        }
        .header{
            text-align: center;
        }
        .header div span{
            background-color: blue; color: white;
        }
        .section div{
            display: inline-block; height: 500px;
        }
        .section .article{
            background-color: yellow; width: 80%;
        }
        .section .aside{
            background-color: green; width: 18%;
        }
        .footer{
            text-align: center; background-color: orange;
        }
    </style>
</head>
<body>
   <div class="header">
       <span>global Header</span>
       <div>
           <span>menu1</span>
           <span>menu2</span>
           <span>menu3</span>
           <span>menu4</span>
           <span>menu5</span>
       </div>
   </div>
   <div class="section">
        <div class="article">
            <span>article Text</span>
        </div>
        <div class="aside">
            <span>quick Side</span>
        </div>
   </div>
   <div class="footer">
       <span>global footer</span>
   </div>
</body>
</html>
