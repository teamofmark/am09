<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>semantic Tag</title>
</head>
<body>
    <header>
        <p>
            모든 page에서 공통으로 사용하는 상단영역. (global)
            page 상단 logo(h1), navigation(nav), sideBox(div)등이 들어간다.
            통상적으로는 변경이 절대 일어나서는 안되는 영역이다.
        </p>
        <h1>
            <a href="">
                <img src="https://via.placeholder.com/150?text=logo" alt="logoPlace">
            </a>
        </h1>
        <nav>
            <ul>
                <li><a href="">menuText</a></li>
            </ul>
        </nav>
        <div>
            <a href="">sign in</a>
            <a href="">cart</a>
            <a href="">search</a>
        </div>
    </header>
</body>
</html>
