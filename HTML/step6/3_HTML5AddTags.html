<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5에서 새로 추가된 잔여 Tag</title>
    <style>
        body > ul li{border:1px solid black; width:250px; list-style:none;}
        body > ul li figure{position:relative;}
        body > ul li figure img{width:100%;}
        body > ul li figure:hover figcaption{display:block;}
        body > ul li figure figcaption{display:none; position:absolute; width:100%; height:100%; background-color:rgba(0,0,0,0.5); left:0; top:0;}
        body > ul li figure figcaption dl{text-align:center; color:white; padding:0;}
        body > ul li figure figcaption dl dt{font-size:24px;}
        body > ul li figure figcaption dl dd{margin:0;}
    </style>
</head>
<body>
    <figure>
        <img src="https://placehold.co/150" alt="undefined Image">
        <figcaption>아직 정의되지 않은 이미지</figcaption>
        <!-- 
            ? figure : 흉상,동상
            * 상징적인 의미를 담은 image의 경우 사용할수 있는 Tag ( about us -> ci 공간...)
            ! image의 비중(무게)이 text보다 많이 느껴질 경우 사용.
            * img Tag의 alt대용으로 figcaption이 사용 가능 함.(웹접근성 측면에서도 좋음)
        -->
    </figure>
    <ul>
        <li>
            <figure>
                <img src="https://placehold.co/150?text=keyboardPicture" alt="제품사진자리">
                <figcaption>
                    <dl>
                        <dt>
                            <mark>삼성공식파트너모니칸</mark>
                            삼성전자 무선키보드 SK-M1600B 멤브레인 키보드 수업용 사무용
                        </dt>
                        <dd>
                            <strong>29,900원</strong><span>배송비무료</span>
                        </dd>
                        <dd><em>내일배송</em> 7.1.(수) 도착</dd>
                    </dl>
                </figcaption>
            </figure>
        </li>
    </ul>
    <progress value="20" max="100"></progress>
    <!-- ? progress는 나타내고픈 진행 상황을 실시간으로 나타낼때 사용 값을 value로 설정하고 최대값을 max로 설정한다.-->
    <meter value="95" min="10" max="100" low="20" high="90"></meter>80%
    <!--
        ? 진행중을 progress가 담당 한다면, meter는 현재 사용량이나 소모된량 등의 정지된 산출값에 적합하다.
        ? value는 현재값, min 은 최소값, max는 최대값, low는 낮다의 기준범위, high는 높다의 기준범위, optimum은 적당하다의 기준범위
    -->
    <ruby>
        韓 <rt>かん</rt>
    </ruby>
    <!-- ? 일본어를 사용 할 시에 일반적인 읽기방법과 다르게 읽는 경우 rt로해당 부분을 처리해준다. 이외 부가문장이 필요하면 <rp></rp>사용-->
    <address>
        <span>인천광역시 부평구 부평동 194-23 SBS아카데미컴퓨터아트학원 부평</span>
        <a href="https://www.incheon.sbsart.com">사이트바로가기</a>
        <a href="tel:+82324370111">전화걸기</a>
        <a href="mailto:privacy@koreaedugroup.com">이메일보내기</a>
        <a href="https://earth.google.com/web/search/%ec%9d%b8%ec%b2%9c%ea%b4%91%ec%97%ad%ec%8b%9c+%eb%b6%80%ed%8f%89%ea%b5%ac+%eb%b6%80%ed%8f%89%eb%8f%99+%ec%9d%b8%ec%b2%9c%ec%bb%b4%ed%93%a8%ed%84%b0%ed%95%99%ec%9b%90-SBS%ec%95%84%ec%b9%b4%eb%8d%b0%eb%af%b8%ec%bb%b4%ed%93%a8%ed%84%b0%ec%95%84%ed%8a%b8%ed%95%99%ec%9b%90/@37.49215605,126.72397655,19.74015497a,818.18242228d,35y,0h,0t,0r/data=CiwiJgokCS9O5bFJEUNAEecnG-cHdULAGWA5uDoYpFBAIbDf5twPHknAQgIIAToDCgEwQgIIAEoNCP___________wEQAA?hl=ko" target="_blank">지도보기</a>
    </address>
     <!--
            ? address
            * 실제 사용 주소뿐 아니라 url 등의 주소, 연락처 관련 정보들을 담는 전용 Tag. - 통상적으로는 footer Tag안에 들어가는 것이 일반적
            * mapApi(naver map, kakao map, google map..)를 동작 시키기 위해 실제 사용주소에 a를 사용하기도 함.
            -p.s- 마이크로포맷으로 작성되는 vcard 형식은 http://microformats.org/code/hcard/creator 에서 만들어서 사용하면 된다.
        vcard란 전자명함을 뜻하며, 안드로이드 와 ios 에서 범용적으로 사용되는 연락처 방식이기도 하다.
            -->
    <details>
        <summary>Copyright 1999-2026</summary>
        <!-- 이하 무엇을(display:block) 사용해도 상관없다. -->
        <p>-by Refns Data. All Rights Reserved.</p>
    </details>
    <!-- 
        어떠한 키워드나 문장(summary)의 요약 및 요소들을 밑에 넣어두고 eventTrigger(click,hover...)로 show/hide 기능이 작동하게 함.
    -->
    <ul>
        <li>User <bdi>hrefs</bdi>: 60 points</li>
        <li>User <bdi>jdoe</bdi>: 80 points</li>
        <li>User <bdi>إيان</bdi>: 90 points</li>
    </ul>
    <!--bdi는 자신의 외부 텍스트와 다른 포맷으로 규정되는 텍스트를 분리하는데에 사용한다.(ex 다국어지원)-->
</body>
</html>
