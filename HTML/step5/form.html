<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form Tag</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>HTML4 Input</legend>
            <ul>
                <li>
                    <label for="userName">이름 : </label>
                    <input type="text" id="userName" placeholder="사용자 이름">
                    <!-- * 문자 전체를 입력받는 field -->
                </li>
                <li>
                    <label for="userPW">비밀번호 : </label>
                    <input type="password" id="userPW" placeholder="비밀번호를 입력하세요">
                </li>
                <li>
                    <input type="radio" name="radioGroup" id="btn_radio1"><label for="btn_radio1">item1</label>
                    <input type="radio" name="radioGroup" id="btn_radio2" checked><label for="btn_radio2">item2</label>
                    <input type="radio" name="radioGroup" id="btn_radio3"><label for="btn_radio3">item3</label>
                    <input type="radio" name="radioGroup" id="btn_radio4"><label for="btn_radio4">item4</label>
                </li>
                <li>
                    <input type="checkbox" id="check1"><label for="check1">check1</label>
                    <input type="checkbox" id="check2"><label for="check2">check2</label>
                    <input type="checkbox" id="check3"><label for="check3">check3</label>
                    <input type="checkbox" id="check4" checked><label for="check4">check4</label>
                </li>
                <li>
                    <label for="talkBox">하고싶은 말 : </label>
                    <textarea id="talkBox" cols="30" rows="10">
                        testText
                    </textarea>
                </li>
                <li>
                    <label for="selectJob">직업선택 : </label>
                    <select id="selectJob">
                        <option>선택하세요</option>
                        <optgroup label="구직자">
                            <option>무직</option>
                            <option selected>학생</option>
                        </optgroup>
                        <optgroup label="근로자">
                            <option>전문직</option>
                            <option>공무원</option>
                        </optgroup>
                    </select>
                </li>
                <li>
                    <input type="button" value="비밀번호확인">
                    <!-- <button>비밀번호확인</button> -->
                    <input type="file">
                    <input type="submit" value="확인">
                    <input type="reset" value="취소">
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>HTML5 Input</legend>
            <label for="userNick">닉네임 : </label>
            <input type="text" id="userNick" placeholder="8자미만" maxlength="8" required autofocus>
            <input type="email" placeholder="example@example.com" readonly>
            <input type="url" placeholder="https://www.naver.com" disabled><br>
            <!-- disabled / enabled -->
            <input type="number" min="1" max="99" step="1" value="1">
            <input type="range" min="-2" max="2" step="1" value="0"> <br>

            <input type="date">
            <!-- * yyyy,mm,dd -->
            <input type="month">
            <!-- * yyyy,mm -->
            <input type="time">
            <!-- * hh,mm,ss -->
            <input type="datetime-local">
            <!-- * yyyy,mm,dd,hh,mm,ss -->
            <input type="week"> <br>
            <!-- * ww -->
            <!-- * <input type="datetime"> : 대부분 브라우저 지원불가. -->
            <input type="search" placeholder="검색어를 입력하세요" autocomplete> <br>
            <label for="typeColor">색상선택 : </label>
            <input type="color" id="typeColor">
        </fieldset>
    </form>
</body>
</html>
