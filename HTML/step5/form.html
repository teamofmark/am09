<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form Tag</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>HTML4 Input</legend>
            <!-- ? ex> 회원가입시 - 필수정보 / 부가정보의 input을 fieldset으로 감싸다.-->
            <ul>
                <li>
                    <label for="userID">아이디 : </label>
                    <!-- ? label : display default - inline -->
                    <input type="text" id="userID">
                    <!-- ? input : display default - inline-block(기능을수행하는 tag's-img,iframe,video..) -->
                    <!-- ! input의 id는 backEnd가 직접적으로 사용하는 id이기 때문에 상호협의하에... -->
                    <!-- 
                        * 상식적인 선 내에서의 web상 naming규칙을 따라야함.
                        ? 1. 한글,띄어쓰기,특문,숫자나 대문자가 앞에오거나 행위 금지.
                        ? 2. 영문키워드 2개이상을 조합해야 함.(예약어개념 - programing Language가 이미 선점한 단어 사용금지)
                    -->
                </li>
                <li>
                    <label for="userPW">비밀번호 : </label>
                    <input type="password" id="userPW">
                </li>
                <li>
                    <!-- todo (input:radio#btn_radio$+label{item$})*4 -->
                    <input type="radio" name="radioGroup" id="btn_radio1" checked>
                    <label for="btn_radio1">item1</label>
                    <input type="radio" name="radioGroup" id="btn_radio2">
                    <label for="btn_radio2">item2</label>
                    <input type="radio" name="radioGroup" id="btn_radio3">
                    <label for="btn_radio3">item3</label>
                    <input type="radio" name="radioGroup" id="btn_radio4">
                    <label for="btn_radio4">item4</label>
                </li>
                <li>
                    <!-- todo (input:checkbox#btn_chk$+label{item$})*4 -->
                    <input type="checkbox" id="btn_chk1" checked>
                    <label for="btn_chk1">item1</label>
                    <input type="checkbox" id="btn_chk2">
                    <label for="btn_chk2">item2</label>
                    <input type="checkbox" id="btn_chk3">
                    <label for="btn_chk3">item3</label>
                    <input type="checkbox" id="btn_chk4">
                    <label for="btn_chk4">item4</label>
                </li>
                <li>
                    <label for="userComment">하고싶은 말 :</label>
                    <textarea id="userComment" cols="30" rows="10"></textarea>
                    <!-- 
                        * 1. cols,rows attr은 css에서 사용해야 함.(삭제하라는 뜻)
                        * 2. Tag 입력불가 - 입력시 다양성 표현 불가.
                        * 3. resize 기능 은 css에서 꺼야함.
                        * 4. font역시 직접 지정해야만 변경됨.
                     -->
                </li>
                <li>
                    <label for="jobSelect">직업선택 : </label>
                    <select id="jobSelect">
                        <option>선택하세요</option>
                        <optgroup label="구직자">
                            <option>무직</option>
                            <option selected>학생</option>
                        </optgroup>
                        <optgroup label="근로자">
                            <option>전문직</option>
                            <option>공무원</option>
                        </optgroup>
                    </select>
                </li>
                <li>
                    <input type="image" src="https://via.placeholder.com/150x50?text=button" alt="이미지버튼">
                    <br>
                    <input type="button" value="비밀번호확인">
                    <br>
                    <button type="submit">
                        우편번호확인
                        <!-- ! display: inline인 대상들만 삽입가능.(a,label 제외) -->
                        <!-- ? defaultAct : submit(전송) -->
                    </button>
                    <br>
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>HTML5 Input</legend>
            <ul>
                <li>
                    <label for="userName">이름 : </label>
                    <input type="text" id="userName" placeholder="8자 이내로 입력하세요." maxlength="8" autofocus required readonly>
                    <!-- 
                        ! placeholder는 시각적표기만 가능하고 음성변환은 불가능
                        ? 대안 :  title="이름을 입력하세요"
                     -->
                     <!--
                        * required : 필수입력 필드, maxlength : 최대글자 제한 , autofocus : 자동초점
                        ! readonly : 읽기전용 (server에 저장이 된적이 있는 data를 불러오기)
                        ! disabled : 비활성화 (입력자체를 막아 server에 저장 자체가 불가능함.)
                        ! enabled : disabled의 counter - 활성화(입력가능 = 전송시 server저장가능)
                      -->
                </li>
                <li>
                    <label for="secEmailAddr">보조이메일 : </label>
                    <input type="email" id="secEmailAddr">
                    <!--type을 email로 설정하면, 모바일에서 해당 필드에 focus 되었을 때, 키보드를 열면서 영문과 @ 버튼이 생긴다. placeholder(ie10이하지원불가)-->
                </li>
                <li>
                    <label for="webURL">웹사이트 : </label>
                    <input type="url" id="webURL" required>
                    <!--type을 url로 설정하면, 모바일에서 해당 필드에 focus 되었을 때, 키보드를 열면서 영문과 .com 버튼이 생기고 누르고있으면 타 도메인으로 변경가능.-->
                </li>
                <li>
                    <label for="userCell">전화번호 : </label>
                    <input type="tel" id="userCell">
                </li>
            </ul>
        </fieldset>
        <div>
            <input type="submit" value="확인">
            <input type="reset" value="취소">
        </div>
    </form>
</body>
</html>
