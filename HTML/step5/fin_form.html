<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제 - 회원가입양식</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>필수입력사항</legend>
            <table>
                <caption>사용자정보</caption>
                <tbody>
                    <tr>
                        <th><label for="userID">아이디</label></th>
                        <td><input type="text" id="userID"></td>
                    </tr>
                    <tr>
                        <th><label for="userPW">비밀번호</label></th>
                        <td><input type="password" id="userPW"></td>
                    </tr>
                    <tr>
                        <th><label for="checkPW">비밀번호확인</label></th>
                        <td><input type="password" id="checkPW"></td>
                    </tr>
                    <tr>
                        <th><label for="userName">이름</label></th>
                        <td><input type="text" id="userName"></td>
                    </tr>
                    <tr>
                        <th><label for="userEmail">이메일</label></th>
                        <td>
                            <input type="email" id="userEmail">
                            <span>@</span>
                            <select>
                                <option>naver</option>
                            </select>
                        </td>
                    </tr>
                </tbody>
            </table>
        </fieldset>
        <fieldset>
            <legend>선택입력사항</legend>
            <table>
                <caption>부가정보</caption>
                <tbody>
                    <tr>
                        <th><label for="userAddr">주소</label></th>
                        <td>
                            <input type="search" id="userAddr">
                            <input type="button" value="주소찾기">
                        </td>
                    </tr>
                    <tr>
                        <th><label for="userCell">연락처</label></th>
                        <td><input type="tel" id="userCell"></td>
                    </tr>
                    <tr>
                        <th><label for="genderType1">성별</label></th>
                        <td>
                            <input type="radio" name="genderType" id="genderType1">
                            <label for="genderType1">남자</label>
                            <input type="radio" name="genderType" id="genderType2">
                            <label for="genderType2">여자</label>
                        </td>
                    </tr>
                    <tr>
                        <th><label for="hobbyType1">취미</label></th>
                        <td>
                            <input type="checkbox" id="hobbyType1">
                            <label for="hobbyType1">독서</label>
                            <input type="checkbox" id="hobbyType2">
                            <label for="hobbyType2">게임</label>
                            <input type="checkbox" id="hobbyType3">
                            <label for="hobbyType3">영화</label>
                        </td>
                    </tr>
                    <tr>
                        <th><label for="userBirth">생년월일시</label></th>
                        <td><input type="datetime-local" id="userBirth"></td>
                    </tr>
                    <tr>
                        <th><label for="favorColor">좋아하는 색상</label></th>
                        <td><input type="color" id="favorColor"></td>
                    </tr>
                    <tr>
                        <th><label for="userHeightRange">키(cm)</label></th>
                        <td><input type="range" id="userHeightRange"></td>
                    </tr>
                    <tr>
                        <th><label for="userSNSURL">SNS</label></th>
                        <td>
                            <input type="url" id="userSNSURL">
                        </td>
                    </tr>
                    <tr>
                        <th><label for="userComment">가입인사</label></th>
                        <td>
                            <textarea id="userComment"></textarea>
                        </td>
                    </tr>
                </tbody>
            </table>
        </fieldset>
        <div>
            <input type="submit" value="확인">
            <input type="reset" value="취소">
        </div>
    </form>
</body>
</html>
