<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form Tag's</title>
</head>
<body>
    <form>
        <!-- ? 내부에 있는 입력된 data 들을 운반 -->
        <fieldset>
            <!-- ? 입력(input)Tag's 의 그룹을 나누는 용도 -->
            <legend>HTML4 Input's</legend>
            <!-- ? 해당 그룹의 주제에 맞는 이름 설정 (비필수) -->
            <ul>
                <li>
                    <label for="userID">ID : </label>
                    <input type="text" id="userID" placeholder="아이디를 입력하세요.">
                </li>
                <li>
                    <label for="userPW">PW : </label>
                    <input type="password" id="userPW" placeholder="비밀번호를 입력하세요.">
                </li>
                <!-- todo li>(input:radio#btn_radio$+label{radio$})*4 -->
                <li>
                    <input type="radio" name="radioGroup" id="btn_radio1">
                    <label for="btn_radio1">radio1</label>
                    <input type="radio" name="radioGroup" id="btn_radio2">
                    <label for="btn_radio2">radio2</label>
                    <input type="radio" name="radioGroup" id="btn_radio3">
                    <label for="btn_radio3">radio3</label>
                    <input type="radio" name="radioGroup" id="btn_radio4">
                    <label for="btn_radio4">radio4</label>
                </li>
            </ul>
        </fieldset>
    </form>
</body>
</html>
