<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>HTML4 Input</legend>
            <ul>
                <li>
                    <label for="userName">사용자 이름 : </label>
                    <input type="text" id="userName">
                </li>
                <li>
                    <input type="password" title="사용자의 비밀번호">
                </li>
                <li>
                    <!-- ? (input:radio#btn_radio$+label{item$})*4 -->
                    <input type="radio" name="radioGroup" id="btn_radio1">
                    <label for="btn_radio1">농협</label>
                    <input type="radio" name="radioGroup" id="btn_radio2">
                    <label for="btn_radio2">item2</label>
                    <input type="radio" name="radioGroup" id="btn_radio3">
                    <label for="btn_radio3">item3</label>
                    <input type="radio" name="radioGroup" id="btn_radio4">
                    <label for="btn_radio4">item4</label>
                </li>
                <!-- ? li>(input:checkbox#btn_chk$+label{checkItem$})*4 -->
                <li>
                    <input type="checkbox" id="btn_chk1">
                    <label for="">checkItem1</label>
                    <input type="checkbox" id="btn_chk2">
                    <label for="">checkItem2</label>
                    <input type="checkbox" id="btn_chk3">
                    <label for="">checkItem3</label>
                    <input type="checkbox" id="btn_chk4">
                    <label for="">checkItem4</label>
                </li>
            </ul>
        </fieldset>
    </form>
</body>
</html>
