<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form Tag</title>
</head>
<body>
    <form action="#">
        <fieldset>
            <legend>HTML4 Input</legend>
            <ul>
                <li>
                    <!-- <label for="userName">사용자 이름 : </label> -->
                    <input type="text" id="userName" placeholder="이름을 적어주세요." title="이름을 기재하세요.">
                </li>
                <li>
                    <label for="userPW">비밀번호 : </label>
                    <input type="password" id="userPW">
                </li>
                <li>
                    <!-- ? (input:radio+label)*4 -->
                    <input type="radio" name="radioGroup" id="btn_radio1">
                    <label for="btn_radio1">항목1</label>
                    <input type="radio" name="radioGroup" id="btn_radio2">
                    <label for="btn_radio2">항목2</label>
                    <input type="radio" name="radioGroup" id="btn_radio3">
                    <label for="btn_radio3">항목3</label>
                    <input type="radio" name="radioGroup" id="btn_radio4">
                    <label for="btn_radio4">항목4</label>
                </li>
                <li>
                    <!-- ? (input:checkbox+label{$})*4 -->
                    <input type="checkbox" id="btn_chk1">
                    <label for="btn_chk1">check1</label>
                    <input type="checkbox" id="btn_chk2">
                    <label for="btn_chk2">check2</label>
                    <input type="checkbox" id="btn_chk3">
                    <label for="btn_chk3">check3</label>
                    <input type="checkbox" id="btn_chk4">
                    <label for="btn_chk4">check4</label>
                </li>
                <li>
                    <textarea cols="30" rows="10">긴 문장 혹은 문단등의 순수 데이터 처리</textarea>
                </li>
                <li>
                    <select>
                        <!--  multiple : 복수선택가능하게 - 비사용 -->
                        <option>직업선택</option>
                        <optgroup label="구직자">
                            <option>무직</option>
                            <option>학생</option>
                        </optgroup>
                        <optgroup label="근로자">
                            <option>전문직</option>
                            <option>공무원</option>
                        </optgroup>
                    </select>
                </li>
                <li>
                    <input type="image" src="https://via.placeholder.com/150x50?text=Button" alt="placeholder">
                    <input type="button" value="찾기">
                    <button>비밀번호찾기</button>
                    <input type="file">
                    <input type="submit" value="확인">
                    <input type="reset" value="취소">
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>HTML5 Input</legend>
            <label for="userName2">이름 : </label>
            <input type="text" id="userName2" required maxlength="8" autofocus readonly>
            <!-- 
                ? readonly : 말그대로 읽기 전용. 읽는 것은 가능하나 쓰는 것은 불가. 
                ! disabled : 읽을수도 쓸 수도 없다.
             -->
             <input type="email" placeholder="teamofmark@gmail.com">
            <!--type을 email로 설정하면, 모바일에서 해당 필드에 focus 되었을 때, 키보드를 열면서 영문과 @ 버튼이 생긴다. placeholder(ie10이하지원불가)-->
             <input type="url" placeholder="https://www.file-examples.com">
            <!--type을 url로 설정하면, 모바일에서 해당 필드에 focus 되었을 때, 키보드를 열면서 영문과 .com 버튼이 생기고 누르고있으면 타 도메인으로 변경가능.-->
             <input type="tel" placeholder="01056658312">
             <!-- ? 한줄로 전화번호를 입력받을 수 있는 양식 -->
             <input type="number" min="1" max="100" step="1" value="0">
            <!--상,하버튼으로 숫자를 기입하는 스핀박스를 생성한다. <input type="number" 최저값, 최대값, 상승값, 초기값 />-->
            <input type="range" min="-2" max="2" step="1" value="0">
            <!--슬라이드바로 숫자를 기입하는 막대를 생성한다. <input type="range" 최저값, 최대값, 상승값, 초기값 />-->
            <input type="date">
            <input type="time">
            <input type="month">
            <input type="week">
            <input type="datetime-local">
            <input type="datetime">
            <label for="typeColor">색상선택 : </label>
            <input type="color" id="typeColor">
        </fieldset>
    </form>
</body>
</html>
