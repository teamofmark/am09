<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>HTML4 Input</legend>
            <ul>
                <li>
                    <label for="userName">사용자 이름 : </label>
                    <input type="text" id="userName">
                </li>
                <li>
                    <input type="password" title="사용자의 비밀번호">
                </li>
                <li>
                    <!-- ? (input:radio#btn_radio$+label{item$})*4 -->
                    <input type="radio" name="radioGroup" id="btn_radio1">
                    <label for="btn_radio1">item1</label>
                    <input type="radio" name="radioGroup" id="btn_radio2">
                    <label for="btn_radio2">item2</label>
                    <input type="radio" name="radioGroup" id="btn_radio3">
                    <label for="btn_radio3">item3</label>
                    <input type="radio" name="radioGroup" id="btn_radio4" checked>
                    <label for="btn_radio4">item4</label>
                </li>
                <!-- ? li>(input:checkbox#btn_chk$+label{checkItem$})*4 -->
                <li>
                    <input type="checkbox" id="btn_chk1">
                    <label for="btn_chk1">checkItem1</label>
                    <input type="checkbox" id="btn_chk2">
                    <label for="btn_chk2">checkItem2</label>
                    <input type="checkbox" id="btn_chk3">
                    <label for="btn_chk3">checkItem3</label>
                    <input type="checkbox" id="btn_chk4" checked>
                    <label for="btn_chk4">checkItem4</label>
                </li>
                <li>
                    <textarea title="textAreaExample"></textarea>
                </li>
                <li>
                    <select title="아래에서 항목을 선택하여 주세요.">
                        <!-- ? 복수다항선택 - multiple. 허나 사용하지 않음. -->
                        <option>직업선택</option>
                        <optgroup label="구직자">
                            <option>무직</option>
                            <option>학생</option>
                        </optgroup>
                        <optgroup label="근로자">
                            <option>전문직</option>
                            <option>공무원</option>
                        </optgroup>
                    </select>
                </li>
                <li>
                    <input type="image" src="https://via.placeholder.com/100x30?text=button" alt="이미지버튼">
                    <!-- ? image type 무쓸모. -->
                    <input type="button" value="비밀번호확인">
                    <!-- ? 전송기능도 수행 가능한 html5 button <button>비밀번호확인</button> -->
                    <input type="submit" value="확인">
                    <input type="reset" value="취소">
                    <input type="file">
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>HTML5 Input</legend>
            <label for="otherName">이름 :</label>
            <input type="text" id="otherName" placeholder="8자미만으로 입력해주세요." required maxlength="7" autofocus readonly>
            <input type="email" placeholder="teamofmark@gmail.com">
            <input type="url" placeholder="https://file-examples.com">
            <input type="tel">
            <input type="number" min="1" max="10" step="1" value="1">
            <input type="range" min="-2" max="2" step="1" value="0">
            <input type="date">
            <input type="month">
            <input type="week">
            <input type="time">
            <input type="datetime-local">
            <!-- <input type="datetime" name="" id="">  / 대부분 브라우저 지원불가-->
            <input type="search" placeholder="검색어를 입력하세요." autocomplete>
            <label for="typeColor">색상선택 : </label>
            <input type="color" id="typeColor">
        </fieldset>
    </form>
</body>
</html>
