<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form Tag's</title>
</head>
<body>
    <form>
        <!-- ? 내부에 있는 입력된 data 들을 운반 -->
        <fieldset>
            <!-- ? 입력(input)Tag's 의 그룹을 나누는 용도 -->
            <legend>HTML4 Input's</legend>
            <!-- ? 해당 그룹의 주제에 맞는 이름 설정 (비필수) -->
            <ul>
                <li>
                    <label for="userID">ID : </label>
                    <input type="text" id="userID" placeholder="아이디를 입력하세요.">
                </li>
                    <!-- ! input의 id는 backEnd가 직접적으로 사용하는 id이기 때문에 상호협의하에... -->
                    <!-- 
                        * 상식적인 선 내에서의 web상 naming규칙을 따라야함.
                        ? 1. 한글,띄어쓰기,특문,숫자나 대문자가 앞에오거나 행위 금지.
                        ? 2. 영문키워드 2개이상을 조합해야 함.(예약어개념 - programing Language가 이미 선점한 단어 사용금지)
                    -->
                    <!--입력 태그 타입 text는 텍스트를 삽입할 때 사용되며, label과 연결이 없을 시 title이 항상 제공 되어야 한다.  maxlength를 이용해 최대 글자를 제어할수있다.-->
                <li>
                    <label for="userPW">PW : </label>
                    <input type="password" id="userPW" placeholder="비밀번호를 입력하세요.">
                </li>
                <!-- todo li>(input:radio#btn_radio$+label{radio$})*4 -->
                <li>
                    <input type="radio" name="radioGroup" id="btn_radio1" checked>
                    <label for="btn_radio1">국민</label>
                    <input type="radio" name="radioGroup" id="btn_radio2">
                    <label for="btn_radio2">신한</label>
                    <input type="radio" name="radioGroup" id="btn_radio3">
                    <label for="btn_radio3">하나</label>
                    <input type="radio" name="radioGroup" id="btn_radio4">
                    <label for="btn_radio4">기업</label>
                </li>
                <!--
                    입력 태그 타입 radio는 라디오 버튼이며, name 을 같은 이름으로 여러 항목을 지정시 그룹화 된다. 또한 label을 이용
                    하여 해당 항목과 버튼을 연결해줄 필요가 있다.
                    value 값설정으로 전달할 값을 넣어 둘 수 있으나, 비워두어도 상관없다.
                    checked 를 이용하여 페이지가 로드 될때 초기 선택값을 넣어 둘 수 있다.
                    그리고 cheackbox와는 달리 하나의 항목만 선택 가능하다.
                -->
                <!-- todo li>(input:checkbox#btn_chk$+label{check$})*4 -->
                <li>
                    <input type="checkbox" id="btn_chk1" checked>
                    <label for="btn_chk1">check1</label>
                    <input type="checkbox" id="btn_chk2">
                    <label for="btn_chk2">check2</label>
                    <input type="checkbox" id="btn_chk3">
                    <label for="btn_chk3">check3</label>
                    <input type="checkbox" id="btn_chk4">
                    <label for="btn_chk4">check4</label>
                </li>
                <!--
                    1. 입력태그타입 checkbox는 다중 선택을 지원 하는 input이며, label을 이용하여 해당 항목과 연결
                    해야 한다.
                    2. value 값은 기존 input 과 동일
                    3. checked 옵션 역시 radio input 과 동일
                -->
                <!-- todo li>label{직업 선택: }+select#selectJob>option*4 -->
                <li>
                    <label for="selectJob">직업 선택: </label>
                    <select id="selectJob">
                        <optgroup label="구직자">
                            <option>무직</option>
                            <option>학생</option>
                        </optgroup>
                        <optgroup label="근로자">
                            <option>전문직</option>
                            <option>공무원</option>
                        </optgroup>
                    </select>
                    <!--
                        select는 선택항목을 목록형의 단축메뉴 형식으로 만드는 입력 양식이다.
                        항목 수만큼의 option 이 필요하고, 이안의 value로 값을 정해 전달한다.
                        multiple 속성값을 이용해 다중 선택을 지원 할수 있고, size 속성값을 이용해 초기 노출 목록수를 제어할수 있다.
                        optgroup으로 중간 그룹을 설정할 수 있다.
                    -->
                </li>
                <li>
                    <textarea title="하시고 싶은 말씀을 남겨주세요." cols="30" rows="10"></textarea>
                    <!-- 
                        ! 1. cols,rows attr은 css에서 사용해야 함.(삭제하라는 뜻)
                        * 2. Tag 입력불가 - 입력시 다양성 표현 불가.
                        * 3. resize 기능 은 css에서 꺼야함.
                        * 4. font역시 직접 지정해야만 변경됨.
                     -->
                    <!--
                        여러줄을 입력 할 수 있는 텍스트 상자인 textarea 는 cols로 가로 입력 너비, rows로 세로입력너비
                        의 초기값을 설정 할 수 있다.
                        주의사항은 pre와 마찬가지로 입력한 그대로를 보여주기 때문에, 초기 데이터 삽입시 공백부분에
                        유의 해야 한다.
                    -->
                </li>
                <!-- todo li>input:image+input:button+input:file+input:submit+input:reset -->
                <li>
                    <input type="image" src="https://via.placeholder.com/150x50?text=button" alt="imgBtnExample">
                    <input type="button" value="아이디중복체크">
                    <button>비밀번호확인</button>
                    <input type="file" name="" id="">
                    <input type="submit" value="전송">
                    <input type="reset" value="취소">
                    <!--
                        버튼으로 사용할수 있는 input에는 image, button, file, submit, reset 이 있는데 해당용도에 따라 적절하게 사용해야 한다.
                        1. image 는 버튼을 웹사이트 디자인에 맞게 디자인된 버튼을 사용할 때 사용 한다.
                        2. button 은 최종 확인 전송 및 페이지 양식 되돌리기, 파일 찾아보기 기능을 제외한 나머지 기능의 버튼 (우편번호, 검색, 추가, 삭제 등)에 사용한다.
                        3. file은 파일 찾아보기 버튼에 사용한다.
                        4. submit은 해당 폼 이 모두 완성 되었을때 완료 및 전송을 할때 사용한다.
                        5. reset은 해당 폼의 모든 양식 내용을 초기화 시킬 때 사용한다.
                    -->
                </li>
            </ul>
        </fieldset>
    </form>
    <!-- todo form>fieldset>legend{HTML5 Input's}+ul>li>label{E-Mail : }+input:email#userEmail -->
    <form>
        <fieldset>
            <legend>HTML5 Input's</legend>
            <ul>
                <li>
                    <label for="userEmail">E-Mail : </label>
                    <input type="email" id="userEmail" maxlength="16" autofocus>
                    <!--type을 email로 설정하면, 모바일에서 해당 필드에 focus 되었을 때, 키보드를 열면서 영문과 @ 버튼이 생긴다. placeholder(ie10이하지원불가)-->
                </li>
                <li>
                    <label for="userURL">webSite URL : </label>
                    <input type="url" id="userURL" disabled>
                    <!-- ? required : 필수입력 필드,
                        ? maxlength : 최대글자 제한 , 
                        ? autofocus : 자동초점, 
                        ? readonly : 읽기전용(ex> 회원정보수정 등 에서 수정 금지필드 등), 
                        ? disabled : 입력 자체를 차단 해야 하는 경우(예> 결제수단 다중선택방지 등..)
                      -->
                </li>
                <li>
                    <label for="userCN">phoneNumber : </label>
                    <input type="tel" id="userCN">
                    <!-- 한줄로 전화번호를 입력받을 수 있는 양식(-제외) -->
                </li>
                <li>
                    <label for="qty">QTY : </label>
                    <input type="number" id="qty" min="1" max="10" step="1" value="1"> 
                    <!--상,하버튼으로 숫자를 기입하는 스핀박스를 생성한다. <input type="number" 최저값, 최대값, 상승값, 초기값 />-->
                </li>
                <li>
                    <label for="sizeSet">SIZE : </label>
                    <input type="range" id="sizeSet" min="-2" max="2" step="1" value="0">
                    <!--슬라이드바로 숫자를 기입하는 막대를 생성한다. <input type="range" 최저값, 최대값, 상승값, 초기값 />-->
                </li>
                <li>
                    <label for="typeDate">Date :</label>
                    <input type="date" id="typeDate">
                    <!--연도,월,날짜 선택 ie10 이하 지원불가(수동입력)-->
                </li>
                <li>
                    <label for="typeDateTime">Datetime-local : </label>
                    <input type="datetime-local" id="typeDateTime">
                    <!--연도,월,날짜,시간 선택 ie10 이하 지원불가(수동입력)-->
                </li>
                <li>
                    <label for="typeTime">시간 선택 : </label>
                    <input type="time" id="typeTime">
                    <!--시간 입력 ie10 이하 지원불가(수동입력)-->
                </li>
                <li>
                    <label for="typeMonth">월 선택 : </label>
                    <input type="month" id="typeMonth">
                    <!--연도,월 선택 ie10 이하 지원불가(수동입력)-->
                </li>
                <li>
                    <label for="typeWeek">주 선택 : </label>
                    <input type="week" id="typeWeek">
                    <!--연도,주 선택 ie10 이하 지원불가(수동입력)-->
                </li>
                <li>
                    <label for="searchField">SEARCH : </label>
                    <input type="search" id="searchField">
                                        <!--type을 search로 설정하면 x 버튼이 우측에 생기며 자동완성기능(autocomplete)지원-backEnd. style 이 safari에서 적용안됨.-->
                </li>
                <li>
                    <label for="typeColor">FAVOR COLOR : </label>
                    <input type="color" id="typeColor">
                    <!--컬러피커창 생성 ie10 이하 지원불가-->
                </li>
            </ul>
            <input type="submit" value="전송">
            <input type="reset" value="취소">
        </fieldset>
    </form>
</body>
</html>
