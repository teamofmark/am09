<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form tag</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>HTML4 Input</legend>
            <ul>
                <li>
                    <input type="text" id="userName" placeholder="이름을 입력하세요" title="이름을 입력하세요">
                </li>
                <li>
                    <input type="password" title="비밀번호를 입력하세요." maxlength="8">
                </li>
                <li>
                    <input type="radio" name="radioGroup" id="btn_radio1" checked>
                    <label for="btn_radio1">항목1</label>
                    <input type="radio" name="radioGroup" id="btn_radio2">
                    <label for="btn_radio2">항목2</label>
                    <input type="radio" name="radioGroup" id="btn_radio3">
                    <label for="btn_radio3">항목3</label>
                    <input type="radio" name="radioGroup" id="btn_radio4">
                    <label for="btn_radio4">항목4</label>
                </li>
                <li>
                    <input type="checkbox" id="btn_chk1" checked><label for="btn_chk1">check1</label>
                    <input type="checkbox" id="btn_chk2"><label for="btn_chk2">check2</label>
                    <input type="checkbox" id="btn_chk3"><label for="btn_chk3">check3</label>
                    <input type="checkbox" id="btn_chk4"><label for="btn_chk4">check4</label>
                </li>
                <li>
                    <textarea cols="30" rows="10">하시고 싶은 말씀을 남겨주세요.</textarea>
                </li>
                <li>
                    <select name="job" multiple size="3">
                        <option>직업선택</option>
                        <optgroup label="구직자">
                            <option selected>무직</option>
                            <option>학생</option>
                        </optgroup>
                        <optgroup label="근로자">
                            <option>전문직</option>
                            <option>공무원</option>
                        </optgroup>
                    </select>
                </li>
                <li>
                    <input type="button" value="작성">
                    <input type="submit" value="확인">
                    <input type="reset" value="취소">
                    <input type="file" value="찾아보기">
                    <input type="image" src="https://via.placeholder.com/100x50?text=imgBtn" alt="imgButton">
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>HTML5 Input</legend>
            <label for="userName">이름 : </label>
            <input type="text" id="userName" placeholder="8자미만" maxlength="8" required autofocus readonly>
            <input type="email" title="사용자이메일" placeholder="example@example.com" required>
            <input type="url" title="사용자웹사이트" placeholder="https://www.example.com" required>
            <input type="number" min="10" max="100" value="10" step="10">
            <input type="range" min="-5" max="5" value="0" step="1">
        </fieldset>
    </form>
</body>
</html>
