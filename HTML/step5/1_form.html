<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form Tag</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>HTML4 Input</legend>
            <ul>
                <li>
                    <label for="userID">사용자 ID : </label>
                    <input type="text" id="userID" placeholder="사용자 ID" title="사용자 ID를 입력하세요.">
                </li>
                <li>
                    <label for="userPW">사용자 PW : </label>
                    <input type="password" id="userPW">
                </li>
                <li>
                    <!-- todo. (input:radio#btn_radio$+label{항목$})*4 -->
                    <input type="radio" name="radioGroup" id="btn_radio1">
                    <label for="btn_radio1">항목1</label>
                    <input type="radio" name="radioGroup" id="btn_radio2" checked>
                    <label for="btn_radio2">항목2</label>
                    <input type="radio" name="radioGroup" id="btn_radio3">
                    <label for="btn_radio3">항목3</label>
                    <input type="radio" name="radioGroup" id="btn_radio4">
                    <label for="btn_radio4">항목4</label>
                </li>
                <li>
                    <!-- todo. (input:checkbox#btn_chk$+label{check$})*4 -->
                    <input type="checkbox" id="btn_chk1">
                    <label for="btn_chk1">check1</label>
                    <input type="checkbox" id="btn_chk2" checked>
                    <label for="btn_chk2">check2</label>
                    <input type="checkbox" id="btn_chk3">
                    <label for="btn_chk3">check3</label>
                    <input type="checkbox" id="btn_chk4">
                    <label for="btn_chk4">check4</label>
                </li>
                <li>
                    <textarea>
                        하시고 싶은 말씀을 남겨주세요.
                    </textarea>
                </li>
                <li>
                    <label for="chooseJob">직업선택 : </label>
                    <select id="chooseJob">
                        <option>직업선택</option>
                        <optgroup label="구직자">
                            <option>무직</option>
                            <option selected>학생</option>
                        </optgroup>
                        <optgroup label="근로자">
                            <option>전문직</option>
                            <option>공무원</option>
                        </optgroup>
                    </select>
                </li>
                <li>
                    <input type="image" src="https://via.placeholder.com/150x50?text=imgBtn" alt="imageButton">
                    <input type="file">
                    <input type="button" value="우편번호찾기">
                    <button type="button">hybrid button</button>
                    <!-- ! default : submit -->
                    <input type="submit" value="확인">
                    <!-- ! form 내 data 전송 -->
                    <input type="reset" value="취소">
                </li>
            </ul>
        </fieldset>
    </form>
    <form>
        <fieldset>
            <legend>HTMl5 Input</legend>
            <label for="userName">이름 : </label>
            <input type="text" id="userName" placeholder="8자미만" required> <br>
            <label for="userPassword">비밀번호 : </label>
            <input type="password" id="userPassword" autofocus> <br>
            <label for="userID">ID : </label>
            <input type="email" id="userID" placeholder="이메일을 입력하세요." value="teamofmark@gmail.com" readonly>
        </fieldset>
        <input type="submit" value="전송">
        <input type="reset" value="취소">
    </form>
</body>
</html>
