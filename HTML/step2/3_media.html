<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>media</title>
</head>
<body>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/BYQ8S5xtY68" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    <!-- <iframe src="http://www.dodammedi.com/" width="1280" height="1024"></iframe> -->
    <embed src="https://www.youtube.com/embed/BYQ8S5xtY68" width="560" height="315">

    <video width="480" height="270" controls autoplay loop muted preload="auto" poster="images/apology-sorry.jpg">
        <source src="mp4/file_example_MP4_480_1_5MG.mp4" type="video/mp4">
    </video>
    <!--
        !autoplay는 video, audio 동일 속성값, 자동 재생을 시킵니다.     
        !controls는 video, audio 동일 속성값, 재생영역에 제어버튼을 활성화 하는 속성값. 
        !loop는 video, audio 동일 속성값, 반복 재생을 시키는 속성값. 
        !preload는 video, audio 동일 속성값, 스트리밍 방식이 아닌 백그라운드 다운로드를 통해 재생. 
        !muted는 video, audio 동일 속성값, 미디어 객체를 불러왔을때, 초기 설정을 mute 상태로 불러오는 속성값. 
        !src는 video, audio 동일 속성값, 미디어 객체를 지정하는 속성값. 
        !poster 는 video 전용 속성값, video객체를 불러오지 못할 때, 대체 이미지를 출력 시키는 속성값`. 
        !width, height는 video 전용 속성값, video 객체 영역의 크기를 정하는 속성값. 
    -->
    <audio src="mp3/file_example_MP3_700KB.mp3" controls></audio>
</body>
</html>
