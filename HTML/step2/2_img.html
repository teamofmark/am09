<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>img Tag</title>
</head>
<body>
    <img src="https://via.placeholder.com/150" alt="undefined">
    <!-- 
        ? 경로(절대/상대)를 담당하는 attr이 2종이 존재.
        * 1. src = inner
        * 2. href = outer
        ? alt = alternate Text 대체문자.
     -->
     <img src="images/file_example_PNG_500kB.png" alt="undefined">
</body>
</html>
