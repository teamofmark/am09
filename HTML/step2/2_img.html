<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image Tag</title>
</head>
<body>
    <img src="images/file_example_PNG_500kB.png" alt="노을진 창가의 테이블에 놓인 맥북">
    <p>
        alt(alternate Text)는 대체 텍스트 <br>
        시각장애인들은 사진을 볼 수 없기 때문에 사진의 내용을 전달하기 위함. <br>
        안정화된 최대 자수는 255자 이내를 권장. 이상 초과 될 경우 본래 longdesc라는 attr이
        사용되었으나 현재는 사용 불가로 전환된 상태이기 때문에 figure / figcaption 사용을 대체 한다.
    </p>
    <figure>
        <img src="https://via.placeholder.com/150x100?text=mainBanner" alt="figcaption">
        <figcaption>
            대체텍스트가 짧을 경우 이런식으로 해결 할 수 있다.
        </figcaption>
    </figure>
</body>
</html>
