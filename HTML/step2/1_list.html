<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list Tag</title>
</head>
<body>
    <ul>
        <li>번호없는목록 1</li>
        <li>번호없는목록 2</li>
        <li>번호없는목록 3</li>
    </ul>
    <p>
        ul은 unordered list의 약자. <br>
        사전적 의미는 중요하지 않다. <br>
        중요한 것은 layout 구성시 navigation, board, sitemap등 같은형태의 반복 구조에 사용이
        적합하다.
    </p>
    <ol>
        <li>번호있는목록 1</li>
        <li>번호있는목록 2</li>
        <li>번호있는목록 3</li>
    </ol>
    <p>
        ol은 ordered list의 약자. <br>
        사전적 의미는 중요하지 않다. <br>
        중요한 것은 layout 구성시 번호로 정렬 되어야 하는 목록 형태의 content에 사용이
        적합하다.
    </p>
</body>
</html>
