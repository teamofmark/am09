<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paragraph</title>
</head>
<body>
    <p>
        저는 문단 Tag 입니다. <br>
        <b>진하게</b>
        <strong>진하게</strong> <br>
        <!-- ? strong은 시각장애인을 배려한 음성강조 tag 이다. -->
        <i>기울임체</i>
        <!-- ? HTML4에서 Italic으로 사용된 기울임체. html5에 와서는 외국어나  분류적인 성격을 띄는 단어, 전문기술용어, 손글씨 등...-->
        <em>기울임체</em> <br>

        <mark>색상강조</mark> <br>

        <sup>위</sup>첨자
        <sub>아래</sub>첨자 <br>

        <s>취소선</s>
        <del>취소선</del> <br>
        
        <u>밑줄</u> <br>

        일부를<small>작게</small> 
        일부를<big>크게</big> <br>

        <kbd>키보드활자</kbd><br />
        <code>컴퓨터코드</code><br />
        <samp>프로그램 처리 결과 표시</samp>
    </p>
    <hr>
    <!-- ! hr(horizontal rule) Tag : 자신을 기준으로 상,하 주제 자체가 바뀌거나 연관성이 없음을 뜻함.  -->
    
</body>
</html>
