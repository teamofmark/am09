<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - heading</title>
</head>
<body>
    <!-- 
        기본 환경 설정
        1. chrome 설치 및 기본 브라우저 설정.
        2. ext(확장) - korean language pack (자동한글 안될시)
        3. ext - color the tag name
        4. ext - helium icon theme
        5. ext - w3c validation offline
        6. ext - 기본 폴더 열기(0_영문폴더) 후 live server 설치.
    -->
    <h1>Heading - 1</h1>
    <!-- h1 = BI, CI -> logo -->
    <div>
        <h2>Heading - 2</h2>
        <!-- body안에서 열리는 큰 공간단위 (페이지 전체 or 각 섹션)의 제목 -->
        <div>
            <h3>Heading - 3</h3>
            <!-- 위 큰 공간단위 단에 박스단위의 제목 -->
            <div>
                <h4>Heading - 4</h4>
                <!-- 위 박스단위(h3) 안의 박스 단위의 제목 -->
                <div>
                    <h5>Heading - 5</h5>
                    <!-- 위 박스단위(h4) 안의 박스 단위의 제목 -->
                    <div>
                        <h6>Heading - 6</h6>
                        <!-- 위 박스단위(h5) 안의 박스 단위의 제목 = 결론? h4까지는 어찌저찌 쓰이는데 그이하는 사용이 어려움 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--  -->
</body>
</html>
